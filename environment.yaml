name: gai4vo
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # PyTorch (CUDA 12.1 — adjust to cu118 or cpu as needed)
  - pytorch>=2.2.0
  - torchvision>=0.17.0
  - torchaudio>=2.2.0
  - pytorch-cuda=12.1

  # Jupyter
  - jupyter
  - jupyterlab
  - nbconvert
  - ipykernel
  - ipywidgets

  # Core scientific stack
  - numpy>=1.24
  - pandas>=2.0
  - matplotlib>=3.7
  - seaborn>=0.13
  - pillow>=10.0
  - scikit-learn>=1.3
  - scipy>=1.11

  # Utilities
  - requests>=2.31
  - tqdm>=4.66

  - pip:
      # HuggingFace ecosystem
      - datasets>=2.19
      - huggingface-hub>=0.22

      # EfficientNet + modern vision models
      - timm>=1.0.3

      # PDF report generation (optional)
      - reportlab>=4.1

      # Type checking / linting (dev)
      - ruff>=0.4
